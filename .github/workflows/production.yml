name: Production Website Deployment

on:
  push:
    branches:
      - main

jobs:
  Test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out GitHub branch
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Angular project
        run: pnpm run build:prod

      - name: Run linter
        run: pnpm run lint

      - name: Run unit tests
        run: pnpm run test

  Update-S3-Bucket:
    needs: [Test]
    runs-on: ubuntu-latest
    steps:
      - name: Check out GitHub branch
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Angular project
        run: pnpm run build:prod

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1-node16
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Deploy hashed assets with long-term caching
        run: |
          # Upload JS and CSS files with content hash in the filename and set long cache
          aws s3 sync dist/ s3://lcc-website-production \
            --exclude "*" \
            --include "*.js" \
            --include "*.css" \
            --include "assets/**/*.svg" \
            --include "assets/**/*.png" \
            --include "assets/**/*.jpg" \
            --include "assets/**/*.jpeg" \
            --include "assets/**/*.gif" \
            --include "assets/**/*.webp" \
            --include "assets/**/*.woff" \
            --include "assets/**/*.woff2" \
            --include "assets/**/*.ttf" \
            --include "assets/**/*.eot" \
            --cache-control "public, max-age=31536000, immutable" \
            --delete
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID}}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-2

      - name: Deploy non-hashed assets with short-term caching
        run: |
          aws s3 sync dist/ s3://lcc-website-production \
            --exclude "*.js" \
            --exclude "*.css" \
            --exclude "assets/**/*.svg" \
            --exclude "assets/**/*.png" \
            --exclude "assets/**/*.jpg" \
            --exclude "assets/**/*.jpeg" \
            --exclude "assets/**/*.gif" \
            --exclude "assets/**/*.webp" \
            --exclude "assets/**/*.woff" \
            --exclude "assets/**/*.woff2" \
            --exclude "assets/**/*.ttf" \
            --exclude "assets/**/*.eot" \
            --cache-control "public, max-age=0, must-revalidate" \
            --delete
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID}}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-2

      - name: Invalidate CloudFront cache for non-hashed files
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.AWS_DISTRIBUTION_ID }} \
            --paths "/index.html" "/favicon.ico" "/manifest.webmanifest" "/assets/icons/*"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1

  Create-Release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract Version from Changelog
        id: version
        run: |
          version=$(grep -m1 -oP '## \[v\K[0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check if Release Exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract Release Notes
        if: steps.check_release.outputs.exists == 'false'
        run: |
          awk '/^## \[/{if(n++)exit}n' CHANGELOG.md | tail -n +2 > release_notes.md

      - name: Create Tag
        if: steps.check_release.outputs.exists == 'false'
        run: |
          git tag ${{ steps.version.outputs.tag }} ${{ github.sha }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create Release
        if: steps.check_release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.version.outputs.tag }} \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file release_notes.md
